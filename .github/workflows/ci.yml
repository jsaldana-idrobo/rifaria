name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  deploy-web-preview:
    needs: quality
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy configuration
        id: deploy_config
        run: |
          if [ -z "${VERCEL_TOKEN}" ] || [ -z "${VERCEL_ORG_ID}" ] || [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        if: steps.deploy_config.outputs.configured == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        if: steps.deploy_config.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        if: steps.deploy_config.outputs.configured == 'true'
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel preview environment
        if: steps.deploy_config.outputs.configured == 'true'
        run: pnpm dlx vercel pull --cwd apps/web --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build frontend preview
        if: steps.deploy_config.outputs.configured == 'true'
        run: pnpm dlx vercel build --cwd apps/web --token="$VERCEL_TOKEN"

      - name: Deploy frontend preview
        if: steps.deploy_config.outputs.configured == 'true'
        run: pnpm dlx vercel deploy --cwd apps/web --prebuilt --token="$VERCEL_TOKEN"

      - name: Skip preview deploy
        if: steps.deploy_config.outputs.configured != 'true'
        run: echo "Skipping preview deploy because Vercel secrets are not configured."

  deploy-web-production:
    needs: quality
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy configuration
        id: deploy_config
        run: |
          if [ -z "${VERCEL_TOKEN}" ] || [ -z "${VERCEL_ORG_ID}" ] || [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        if: steps.deploy_config.outputs.configured == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        if: steps.deploy_config.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        if: steps.deploy_config.outputs.configured == 'true'
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel environment
        if: steps.deploy_config.outputs.configured == 'true'
        run: pnpm dlx vercel pull --cwd apps/web --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build frontend for Vercel
        if: steps.deploy_config.outputs.configured == 'true'
        run: pnpm dlx vercel build --cwd apps/web --prod --token="$VERCEL_TOKEN"

      - name: Deploy frontend to Vercel
        if: steps.deploy_config.outputs.configured == 'true'
        run: pnpm dlx vercel deploy --cwd apps/web --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Skip deploy
        if: steps.deploy_config.outputs.configured != 'true'
        run: echo "Skipping web deploy because Vercel secrets are not configured."
