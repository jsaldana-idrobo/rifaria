name: Sonar

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  sonar:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}

    steps:
      - name: Check Sonar configuration
        id: sonar_config
        run: |
          if [ -z "${SONAR_TOKEN}" ] || [ -z "${SONAR_ORGANIZATION}" ] || [ -z "${SONAR_PROJECT_KEY}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.sonar_config.outputs.configured == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        if: steps.sonar_config.outputs.configured == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        if: steps.sonar_config.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Cache Sonar packages
        if: steps.sonar_config.outputs.configured == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install
        if: steps.sonar_config.outputs.configured == 'true'
        run: pnpm install --frozen-lockfile

      - name: Sonar scan
        if: steps.sonar_config.outputs.configured == 'true'
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}

      - name: Skip Sonar scan
        if: steps.sonar_config.outputs.configured != 'true'
        run: echo "Skipping Sonar scan because SONAR_TOKEN, SONAR_ORGANIZATION or SONAR_PROJECT_KEY are not configured."
